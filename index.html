<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz about Gustavo</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

#startScreen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #00e6ff;
    font-weight: bold;
}

#quizContainer {
    display: none;
    padding: 20px;
}

.questionBox {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    width: 60%;
    margin: auto;
}

label {
    display: block;
    margin: 8px;
    cursor: pointer;
}

#result {
    font-size: 22px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>How well do you know Gustavo?</h1>
    <button onclick="startQuiz()">START</button>
</div>

<!-- QUIZ -->
<div id="quizContainer">
    <h2 id="question"></h2>

    <div class="questionBox" id="options"></div>

    <br>
    <button onclick="nextQuestion()">NEXT</button>

    <p id="result"></p>
</div>

<script>
const questions = [
    {q:"What is Gustavo’s sport?", o:["Football","Athletics","Swimming","Basketball"], a:1},
    {q:"Who is Gustavo’s favorite artist?", o:["Sabrina Carpenter","Taylor Swift","Drake","Billie Eilish"], a:0},
    {q:"What does Gustavo like to do?", o:["Sleep","Study only","Play games","Nothing"], a:0},
    {q:"What distances does Gustavo like to run?", o:["100m","200m","800m and 1000m","5km"], a:2},
    {q:"What is Gustavo’s favorite subject?", o:["Math","English","PE","None"], a:3},
    {q:"Who is Gustavo’s favorite character?", o:["McQueen","Batman","Naruto","Spider-Man"], a:0},
    {q:"How many siblings does Gustavo have?", o:["0","1","2","3"], a:2},
    {q:"Where was Gustavo’s last race?", o:["School","FAP 6 U-16 in Londrina","Olympics","City race"], a:1},
    {q:"What is Gustavo’s favorite food?", o:["Pizza","Burger","Pasta","Rice"], a:0},
    {q:"What does Gustavo want for his future?", o:["Olympics and sleep","Stop training","Gamer","Nothing"], a:0}
];

let current = 0;
let score = 0;
let selected = null;

function startQuiz(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";
    showQuestion();
}

function showQuestion(){
    let q = questions[current];

    document.getElementById("question").innerText = q.q;

    let html = "";
    q.o.forEach((opt,i)=>{
        html += `
        <label>
            <input type="radio" name="opt" value="${i}">
            ${opt}
        </label>`;
    });

    document.getElementById("options").innerHTML = html;
}

function nextQuestion(){
    let selectedOption = document.querySelector("input[name='opt']:checked");

    if(!selectedOption){
        alert("Choose an answer!");
        return;
    }

    if(parseInt(selectedOption.value) === questions[current].a){
        score++;
    }

    current++;

    if(current < questions.length){
        showQuestion();
    } else {
        document.getElementById("question").innerText = "Finished!";
        document.getElementById("options").innerHTML = "";
        document.querySelector("button").style.display = "none";

        document.getElementById("result").innerText =
        `You got ${score} out of ${questions.length}`;
    }
}
</script>

</body>
</html>
